<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Gilgit Adventure Treks</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    :root {
      --primary: #2D6A4F;
      --primary-light: #40916C;
      --primary-dark: #1B4332;
      --gold: #D4A03C;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Times New Roman', Times, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      padding: 2rem 1rem;
    }
    .login-card {
      background: var(--card);
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
    }
    .login-card .logo-area {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-card .logo-area img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 0.5rem;
    }
    .login-card h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 0.25rem;
      font-size: 1.5rem;
    }
    .login-card .subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .error-msg {
      background: #fef2f2;
      color: var(--danger);
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .success-msg {
      background: #f0fdf4;
      color: #16a34a;
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: var(--text);
    }
    .form-group .optional {
      font-weight: 400;
      color: var(--text-light);
      font-size: 0.8rem;
    }
    .form-control {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
    }
    .btn-primary {
      width: 100%;
      padding: 0.7rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .links {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-light);
    }
    .links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <img src="images/logo.png" alt="Gilgit Adventure Treks">
      </div>
      <h1>Gilgit Adventure Treks</h1>
      <p class="subtitle">Create your account</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone <span class="optional">(optional)</span></label>
          <input type="tel" id="phone" class="form-control" placeholder="e.g. +92 300 1234567">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
      </form>

      <div class="links">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
        <p style="margin-top:0.5rem;"><a href="index.html">Back to Home</a></p>
      </div>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('user_token')) {
      window.location.href = 'profile.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, phone })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.message || 'Registration failed';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
          return;
        }

        localStorage.setItem('user_token', data.token);
        localStorage.setItem('user_name', data.name);
        localStorage.setItem('user_email', data.email);
        localStorage.setItem('user_avatar', data.avatar || '');

        successEl.textContent = 'Account created! Redirecting...';
        successEl.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 1000);
      } catch (err) {
        errorEl.textContent = 'Network error. Is the server running?';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
