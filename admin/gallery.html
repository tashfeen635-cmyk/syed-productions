<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Gilgit Adventure Treks — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Gallery Images</h2>
        <button class="btn btn-primary" onclick="showAddModal()">+ Add Image</button>
      </div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Preview</th>
              <th>Order</th>
              <th>Alt Text</th>
              <th>Hidden</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="galleryBody">
            <tr><td colspan="5" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="admin-modal-overlay" id="galleryModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="modalTitle">Add Image</h3>
        <button class="admin-modal-close" onclick="closeModal('galleryModal')">&times;</button>
      </div>
      <div class="admin-modal-body">
        <form id="galleryForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label for="gUrl">Image URL</label>
            <input type="url" id="gUrl" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="gAlt">Alt Text</label>
            <input type="text" id="gAlt" class="form-control">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="gOrder">Sort Order</label>
              <input type="number" id="gOrder" class="form-control" value="0">
            </div>
            <div class="form-group">
              <label for="gHidden">Hidden (See More)</label>
              <select id="gHidden" class="form-control">
                <option value="false">No — Visible</option>
                <option value="true">Yes — Hidden by default</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('galleryModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveImage()">Save</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
