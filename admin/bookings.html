<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Syed Productions — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Bookings</h2>
      </div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Reference</th>
              <th>Destination</th>
              <th>Dates</th>
              <th>Travelers</th>
              <th>Total</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookBody">
            <tr><td colspan="8" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Status Modal -->
  <div class="admin-modal-overlay" id="statusModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3>Update Booking Status</h3>
        <button class="admin-modal-close" onclick="closeModal('statusModal')">&times;</button>
      </div>
      <div class="admin-modal-body">
        <input type="hidden" id="editBookingId">
        <div class="form-group">
          <label for="bookingStatus">Status</label>
          <select id="bookingStatus" class="form-control">
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
        <button class="btn btn-primary" onclick="updateStatus()">Update</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/bookings.js"></script>
</body>
</html>
