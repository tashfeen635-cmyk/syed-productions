<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Gilgit Adventure Treks — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Videos</h2>
        <button class="btn btn-primary" onclick="showAddModal()">+ Add Video</button>
      </div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order</th>
              <th>Title</th>
              <th>Tag</th>
              <th>Video URL</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="videoBody">
            <tr><td colspan="5" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="admin-modal-overlay" id="videoModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="modalTitle">Add Video</h3>
        <button class="admin-modal-close" onclick="closeModal('videoModal')">&times;</button>
      </div>
      <div class="admin-modal-body">
        <form id="videoForm">
          <input type="hidden" id="editId">
          <div class="form-group">
            <label for="vTitle">Title</label>
            <input type="text" id="vTitle" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="vDesc">Description</label>
            <input type="text" id="vDesc" class="form-control">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="vTag">Tag</label>
              <select id="vTag" class="form-control">
                <option value="Cinematic">Cinematic</option>
                <option value="Client Story">Client Story</option>
                <option value="Destination">Destination</option>
              </select>
            </div>
            <div class="form-group">
              <label for="vOrder">Sort Order</label>
              <input type="number" id="vOrder" class="form-control" value="0">
            </div>
          </div>
          <div class="form-group">
            <label for="vUrl">Video URL (local path or URL)</label>
            <input type="text" id="vUrl" class="form-control" required>
          </div>
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('videoModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveVideo()">Save</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/videos.js"></script>
</body>
</html>
