<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Syed Productions — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <!-- Change Username -->
    <div class="admin-card">
      <div class="admin-card-header"><h2>Change Username</h2></div>
      <div class="admin-card-body">
        <div class="settings-msg" id="usernameMsg"></div>
        <form id="usernameForm">
          <div class="form-group">
            <label for="newUsername">New Username</label>
            <input type="text" id="newUsername" class="form-control" placeholder="Enter new username" required minlength="3">
          </div>
          <div class="form-group">
            <label for="usernameCurrentPass">Current Password</label>
            <div class="password-wrapper">
              <input type="password" id="usernameCurrentPass" class="form-control" placeholder="Enter current password to confirm" required>
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Update Username</button>
        </form>
      </div>
    </div>

    <!-- Change Password -->
    <div class="admin-card">
      <div class="admin-card-header"><h2>Change Password</h2></div>
      <div class="admin-card-body">
        <div class="settings-msg" id="passwordMsg"></div>
        <form id="passwordForm">
          <div class="form-group">
            <label for="passwordCurrentPass">Current Password</label>
            <div class="password-wrapper">
              <input type="password" id="passwordCurrentPass" class="form-control" placeholder="Enter current password" required>
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="password-wrapper">
              <input type="password" id="newPassword" class="form-control" placeholder="Enter new password (min 6 characters)" required minlength="6">
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="password-wrapper">
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required minlength="6">
              <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    initAdminLayout();

    function togglePassword(btn) {
      const input = btn.previousElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '&#128064;';
      } else {
        input.type = 'password';
        btn.innerHTML = '&#128065;';
      }
    }

    // Pre-fill current username
    document.getElementById('newUsername').value = localStorage.getItem('admin_username') || '';

    function showMsg(el, text, isError) {
      el.textContent = text;
      el.className = 'settings-msg ' + (isError ? 'settings-error' : 'settings-success');
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // Change Username
    document.getElementById('usernameForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('usernameMsg');
      const newUsername = document.getElementById('newUsername').value.trim();
      const currentPassword = document.getElementById('usernameCurrentPass').value;

      try {
        const data = await apiCall('/auth/profile', {
          method: 'PUT',
          body: JSON.stringify({ newUsername, currentPassword })
        });
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_username', data.username);
        document.getElementById('adminUser').textContent = data.username;
        document.getElementById('usernameCurrentPass').value = '';
        showMsg(msgEl, 'Username updated successfully!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });

    // Change Password
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('passwordMsg');
      const currentPassword = document.getElementById('passwordCurrentPass').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showMsg(msgEl, 'New passwords do not match', true);
        return;
      }

      try {
        const data = await apiCall('/auth/profile', {
          method: 'PUT',
          body: JSON.stringify({ newPassword, currentPassword })
        });
        localStorage.setItem('admin_token', data.token);
        document.getElementById('passwordCurrentPass').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        showMsg(msgEl, 'Password updated successfully!', false);
      } catch (err) {
        showMsg(msgEl, err.message, true);
      }
    });
  </script>
</body>
</html>
