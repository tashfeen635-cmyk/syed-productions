<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Syed Productions</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Syed Productions</h1>
      <p class="subtitle">Admin Panel Login</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            <button type="button" class="password-toggle" onclick="togglePassword(this)">&#128065;</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.7rem;">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    function togglePassword(btn) {
      const input = btn.previousElementSibling;
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '&#128064;';
      } else {
        input.type = 'password';
        btn.innerHTML = '&#128065;';
      }
    }

    // If already logged in, redirect
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.message || 'Login failed';
          errorEl.style.display = 'block';
          return;
        }

        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_username', data.username);
        window.location.href = '/admin/index.html';
      } catch (err) {
        errorEl.textContent = 'Network error. Is the server running?';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
