<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <h1>Syed Productions — Admin</h1>
    <div class="topbar-right">
      <span class="admin-user" id="adminUser"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <nav class="admin-nav">
    <a href="index.html">Dashboard</a>
    <a href="destinations.html">Destinations</a>
    <a href="bookings.html">Bookings</a>
    <a href="reviews.html">Reviews</a>
    <a href="deals.html">Deals</a>
    <a href="subscribers.html">Subscribers</a>
    <a href="videos.html">Videos</a>
    <a href="gallery.html">Gallery</a>
    <a href="team.html">Team</a>
    <a href="settings.html">Settings</a>
  </nav>

  <div class="admin-content">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Deals</h2>
        <button class="btn btn-primary" onclick="showAddModal()">+ Add Deal</button>
      </div>
      <div class="admin-card-body admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Destination</th>
              <th>Old Price</th>
              <th>New Price</th>
              <th>Badge</th>
              <th>Expires</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="dealBody">
            <tr><td colspan="8" style="text-align:center;color:#94a3b8;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="admin-modal-overlay" id="dealModal">
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h3 id="modalTitle">Add Deal</h3>
        <button class="admin-modal-close" onclick="closeModal('dealModal')">&times;</button>
      </div>
      <div class="admin-modal-body">
        <form id="dealForm">
          <input type="hidden" id="editId">
          <div class="form-row">
            <div class="form-group">
              <label for="dlName">Package Name</label>
              <input type="text" id="dlName" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="dlDest">Destination</label>
              <input type="text" id="dlDest" class="form-control" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dlOldPrice">Old Price (PKR)</label>
              <input type="number" id="dlOldPrice" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="dlNewPrice">New Price (PKR)</label>
              <input type="number" id="dlNewPrice" class="form-control" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="dlBadge">Badge</label>
              <input type="text" id="dlBadge" class="form-control" placeholder="e.g. Hot Deal" required>
            </div>
            <div class="form-group">
              <label for="dlExpires">Expires At</label>
              <input type="datetime-local" id="dlExpires" class="form-control" required>
            </div>
          </div>
          <div class="form-group">
            <label for="dlImage">Image URL</label>
            <input type="url" id="dlImage" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="dlDesc">Description</label>
            <textarea id="dlDesc" class="form-control" rows="3" required></textarea>
          </div>
        </form>
      </div>
      <div class="admin-modal-footer">
        <button class="btn btn-outline" onclick="closeModal('dealModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveDeal()">Save</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="js/deals.js"></script>
</body>
</html>
